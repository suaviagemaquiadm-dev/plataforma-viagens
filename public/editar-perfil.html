<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - Sua Viagem Aqui</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0D1117;
            color: #E6EDF3;
        }
        .form-input, .form-textarea {
            background-color: #010409;
            border: 1px solid #30363D;
            color: #E6EDF3;
            border-radius: 8px;
            padding: 12px 16px;
            width: 100%;
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: #FF3000;
        }
        .btn-save {
            background-color: #FF3000;
            color: white;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-save:hover { background-color: #ff5533; }
        .btn-save:disabled { background-color: #4b2f27; cursor: not-allowed; }
        .feedback-message {
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }
        .success-message { background-color: #0f3d2f; color: #6ee7b7; border: 1px solid #6ee7b7; }
        .error-message { background-color: #481212; color: #f87171; border: 1px solid #f87171; }
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Container de Loading -->
    <div id="loading-container" class="fixed inset-0 bg-gray-900 bg-opacity-80 flex items-center justify-center z-50">
        <div class="text-center">
            <i class="fas fa-spinner fa-spin text-4xl text-white"></i>
            <p class="mt-4 text-lg text-white">A carregar o seu perfil...</p>
        </div>
    </div>

    <!-- Conteúdo Principal -->
    <main id="main-content" class="hidden max-w-4xl mx-auto">
        <header class="mb-8">
            <a href="dashboard.html" class="text-gray-400 hover:text-white transition-colors"><i class="fas fa-arrow-left mr-2"></i>Voltar para o Painel</a>
            <h1 class="text-3xl font-bold text-white mt-2">Editar Perfil do Parceiro</h1>
            <p class="text-gray-400">Mantenha as suas informações atualizadas para atrair mais clientes.</p>
        </header>

        <!-- Container de Mensagens de Feedback -->
        <div id="feedback-container"></div>

        <!-- Formulário de Edição -->
        <form id="edit-profile-form" class="bg-[#161B22] border border-[#30363D] rounded-xl p-8 space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Nome do Negócio -->
                <div>
                    <label for="business-name" class="block text-sm font-medium text-gray-300">Nome do Negócio</label>
                    <input id="business-name" type="text" required class="mt-1 form-input">
                </div>
                <!-- Nome do Responsável -->
                <div>
                    <label for="owner-name" class="block text-sm font-medium text-gray-300">Seu Nome (Responsável)</label>
                    <input id="owner-name" type="text" required class="mt-1 form-input">
                </div>
                <!-- WhatsApp -->
                <div>
                    <label for="whatsapp" class="block text-sm font-medium text-gray-300">WhatsApp (com DDD)</label>
                    <input id="whatsapp" type="tel" required placeholder="(XX) XXXXX-XXXX" class="mt-1 form-input">
                </div>
            </div>

            <!-- Descrição do Negócio -->
            <div>
                <label for="description" class="block text-sm font-medium text-gray-300">Descrição do seu Negócio</label>
                <textarea id="description" rows="5" class="mt-1 form-textarea" placeholder="Descreva os seus serviços, diferenciais e o que os clientes podem esperar."></textarea>
            </div>

            <hr class="border-gray-700">

            <!-- Galeria de Imagens -->
            <div>
                <h2 class="text-lg font-semibold text-white">Galeria de Imagens</h2>
                <p class="text-sm text-gray-400 mb-4">Envie fotos do seu estabelecimento, serviços ou produtos. A primeira imagem será a sua foto de capa.</p>
                <div id="gallery-preview" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 mb-4">
                    <!-- Imagens enviadas aparecerão aqui -->
                </div>
                <label for="image-upload" class="cursor-pointer bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg transition inline-flex items-center">
                    <i class="fas fa-upload mr-2"></i> Adicionar Fotos
                </label>
                <input type="file" id="image-upload" multiple accept="image/*" class="hidden">
                <div id="upload-progress-container" class="mt-4 space-y-2"></div>
            </div>

            <hr class="border-gray-700">

            <h2 class="text-lg font-semibold text-white">Redes Sociais e Website</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                 <!-- Website -->
                <div>
                    <label for="website" class="block text-sm font-medium text-gray-300">Website (opcional)</label>
                    <input id="website" type="url" placeholder="https://seu-site.com" class="mt-1 form-input">
                </div>
                <!-- Instagram -->
                <div>
                    <label for="instagram" class="block text-sm font-medium text-gray-300">Instagram (opcional)</label>
                    <input id="instagram" type="url" placeholder="https://instagram.com/seu-perfil" class="mt-1 form-input">
                </div>
            </div>

            <!-- Botão de Submissão -->
            <div class="pt-4">
                <button type="submit" id="submit-button" class="w-full md:w-auto btn-save">
                    <span id="button-text">Salvar Alterações</span>
                    <div id="button-spinner" class="spinner hidden"></div>
                </button>
            </div>
        </form>
    </main>

    <!-- Script Firebase -->
    <script type="module">
        // 1. Importações
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        // 2. Configuração Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAVThw7fxVoEQHJMMiuwLfLSvlevKetlIg",
            authDomain: "sua-viagem-aqui-b0173.firebaseapp.com",
            projectId: "sua-viagem-aqui-b0173",
            storageBucket: "sua-viagem-aqui-b0173.appspot.com",
            messagingSenderId: "593994869307",
            appId: "1:593994869307:web:c66462ff2c524f55ad0a1e",
        };

        // 3. Inicialização
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // 4. Elementos do DOM
        const loadingContainer = document.getElementById('loading-container');
        const mainContent = document.getElementById('main-content');
        const editForm = document.getElementById('edit-profile-form');
        const feedbackContainer = document.getElementById('feedback-container');
        const submitButton = document.getElementById('submit-button');
        const imageUploadInput = document.getElementById('image-upload');
        const galleryPreview = document.getElementById('gallery-preview');
        const uploadProgressContainer = document.getElementById('upload-progress-container');

        let currentUser = null;

        // 5. Controlo de Acesso e Carregamento de Dados
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loadProfileData(user.uid);
            } else {
                window.location.href = 'pagina_login.html';
            }
        });

        async function loadProfileData(uid) {
            try {
                const partnerDocRef = doc(db, 'partners', uid);
                const docSnap = await getDoc(partnerDocRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    editForm['business-name'].value = data.businessName || '';
                    editForm['owner-name'].value = data.ownerName || '';
                    editForm['whatsapp'].value = data.whatsapp || '';
                    editForm['description'].value = data.description || '';
                    editForm['website'].value = data.website || '';
                    editForm['instagram'].value = data.instagram || '';
                    
                    // Carregar galeria de imagens
                    renderGallery(data.galleryImages || []);
                }
            } catch (error) {
                console.error("Erro ao carregar perfil:", error);
            } finally {
                loadingContainer.classList.add('hidden');
                mainContent.classList.remove('hidden');
            }
        }

        // 6. Lógica de Upload de Imagens
        imageUploadInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files.length || !currentUser) return;

            for (const file of files) {
                uploadImage(file);
            }
        });

        function uploadImage(file) {
            const filePath = `partners/${currentUser.uid}/${Date.now()}_${file.name}`;
            const storageRef = ref(storage, filePath);
            const uploadTask = uploadBytesResumable(storageRef, file);

            const progressElement = document.createElement('div');
            progressElement.innerHTML = `<div class="text-sm">${file.name}</div><div class="w-full bg-gray-600 rounded-full h-2.5"><div class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div></div>`;
            uploadProgressContainer.appendChild(progressElement);
            const progressBar = progressElement.querySelector('.bg-blue-600');

            uploadTask.on('state_changed', 
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    progressBar.style.width = progress + '%';
                }, 
                (error) => {
                    console.error("Erro no upload:", error);
                    progressElement.innerHTML = `<div class="text-red-400">Falha no envio de ${file.name}</div>`;
                }, 
                async () => {
                    const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                    const partnerDocRef = doc(db, 'partners', currentUser.uid);
                    await updateDoc(partnerDocRef, {
                        galleryImages: arrayUnion({ url: downloadURL, path: filePath })
                    });
                    
                    // Atualiza a galeria na página
                    const docSnap = await getDoc(partnerDocRef);
                    renderGallery(docSnap.data().galleryImages || []);
                    progressElement.remove();
                }
            );
        }

        function renderGallery(images) {
            galleryPreview.innerHTML = '';
            images.forEach(image => {
                const imgContainer = document.createElement('div');
                imgContainer.className = 'relative group';
                imgContainer.innerHTML = `
                    <img src="${image.url}" class="w-full h-32 object-cover rounded-lg">
                    <div class="absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <button data-path="${image.path}" class="delete-image-btn text-white text-2xl"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
                galleryPreview.appendChild(imgContainer);
            });
        }
        
        // Evento para apagar imagens
        galleryPreview.addEventListener('click', async (e) => {
            const deleteBtn = e.target.closest('.delete-image-btn');
            if (deleteBtn && currentUser) {
                const path = deleteBtn.dataset.path;
                if (!confirm("Tem a certeza de que quer apagar esta imagem?")) return;

                try {
                    // Apagar do Storage
                    const imageRef = ref(storage, path);
                    await deleteObject(imageRef);

                    // Apagar do Firestore
                    const partnerDocRef = doc(db, 'partners', currentUser.uid);
                    const docSnap = await getDoc(partnerDocRef);
                    const currentImages = docSnap.data().galleryImages || [];
                    const imageToRemove = currentImages.find(img => img.path === path);
                    if (imageToRemove) {
                        await updateDoc(partnerDocRef, {
                            galleryImages: arrayRemove(imageToRemove)
                        });
                    }
                    
                    renderGallery(currentImages.filter(img => img.path !== path));
                    showFeedback("Imagem apagada com sucesso!", "success");
                } catch (error) {
                    console.error("Erro ao apagar imagem:", error);
                    showFeedback("Ocorreu um erro ao apagar a imagem.", "error");
                }
            }
        });

        // 7. Lógica de Submissão do Formulário de Texto
        editForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            submitButton.disabled = true;
            feedbackContainer.innerHTML = '';

            const updatedData = {
                businessName: editForm['business-name'].value,
                ownerName: editForm['owner-name'].value,
                whatsapp: editForm['whatsapp'].value,
                description: editForm['description'].value,
                website: editForm['website'].value,
                instagram: editForm['instagram'].value,
            };

            try {
                const partnerDocRef = doc(db, 'partners', currentUser.uid);
                await updateDoc(partnerDocRef, updatedData);
                showFeedback("Perfil atualizado com sucesso!", "success");
            } catch (error) {
                console.error("Erro ao atualizar perfil:", error);
                showFeedback("Ocorreu um erro ao salvar as alterações.", "error");
            } finally {
                submitButton.disabled = false;
            }
        });

        function showFeedback(message, type) { /* ... (código existente) ... */ }
    </script>
</body>
</html>
