<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Anunciante - Sua Viagem Aqui</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0D1117;
            color: #E6EDF3;
        }
        .form-input, .form-select {
            background-color: #010409;
            border: 1px solid #30363D;
            color: #E6EDF3;
            border-radius: 8px;
            padding: 12px 16px;
            width: 100%;
            transition: border-color 0.2s;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #FF3000;
        }
        .btn-custom-orange {
            background-color: #FF3000;
            color: white;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-custom-orange:hover { background-color: #ff5533; }
        .btn-custom-orange:disabled { background-color: #4b2f27; cursor: not-allowed; }
        .feedback-message {
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }
        .error-message { background-color: #481212; color: #f87171; border: 1px solid #f87171; }
        .success-message { background-color: #0f3d2f; color: #6ee7b7; border: 1px solid #6ee7b7; }
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Container Principal -->
    <div class="flex flex-col items-center justify-center min-h-screen py-12 px-4">

        <!-- Logo -->
        <a href="index.html" class="flex items-center group mb-8">
            <i class="fas fa-map-marker-alt text-yellow-400 text-3xl mr-3"></i>
            <span class="text-2xl font-bold text-white">Sua Viagem <span class="text-orange-600">Aqui</span></span>
        </a>

        <!-- Cartão do Formulário -->
        <div class="w-full max-w-2xl p-8 space-y-6 bg-[#161B22] rounded-2xl shadow-lg border border-[#30363D]">

            <!-- Cabeçalho -->
            <div>
                <h2 class="text-2xl font-bold text-center text-white">
                    Torne-se um Parceiro
                </h2>
                <p class="mt-2 text-sm text-center text-gray-400">
                    Preencha os dados abaixo para começar a divulgar o seu negócio.
                </p>
            </div>

            <!-- Container de Mensagens de Feedback -->
            <div id="feedback-container"></div>

            <!-- Formulário de Cadastro -->
            <form id="register-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Nome do Negócio -->
                    <div>
                        <label for="business-name" class="block text-sm font-medium text-gray-300">Nome do Negócio</label>
                        <input id="business-name" type="text" required class="mt-1 form-input">
                    </div>

                    <!-- Nome do Responsável -->
                    <div>
                        <label for="owner-name" class="block text-sm font-medium text-gray-300">Seu Nome (Responsável)</label>
                        <input id="owner-name" type="text" required class="mt-1 form-input">
                    </div>

                    <!-- E-mail -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-300">E-mail de Acesso</label>
                        <input id="email" type="email" required autocomplete="email" class="mt-1 form-input">
                    </div>

                    <!-- WhatsApp -->
                    <div>
                        <label for="whatsapp" class="block text-sm font-medium text-gray-300">WhatsApp (com DDD)</label>
                        <input id="whatsapp" type="tel" required placeholder="(XX) XXXXX-XXXX" class="mt-1 form-input">
                    </div>
                    
                    <!-- Senha -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-300">Crie uma Senha</label>
                        <input id="password" type="password" required autocomplete="new-password" class="mt-1 form-input">
                    </div>

                    <!-- Confirmar Senha -->
                    <div>
                        <label for="confirm-password" class="block text-sm font-medium text-gray-300">Confirme a Senha</label>
                        <input id="confirm-password" type="password" required autocomplete="new-password" class="mt-1 form-input">
                    </div>

                    <!-- Categoria -->
                    <div class="md:col-span-2">
                        <label for="category" class="block text-sm font-medium text-gray-300">Categoria do Negócio</label>
                        <select id="category" required class="mt-1 form-select">
                            <option value="" disabled selected>Selecione uma categoria</option>
                            <option value="agencias">Agências de Viagens</option>
                            <option value="camping">Camping</option>
                            <option value="guias">Guias de Turismo</option>
                            <option value="hospedagem">Hotéis e Pousadas</option>
                            <option value="restaurantes">Restaurantes</option>
                        </select>
                    </div>
                </div>

                <!-- Botão de Submissão -->
                <div>
                    <button type="submit" id="submit-button" class="w-full btn-custom-orange">
                        <span id="button-text">Finalizar Cadastro</span>
                        <div id="button-spinner" class="spinner hidden"></div>
                    </button>
                </div>
            </form>

            <!-- Link para Login -->
            <p class="text-sm text-center text-gray-400">
                Já tem uma conta?
                <a href="pagina_login.html" class="font-medium text-orange-500 hover:text-orange-400">
                    Faça o login aqui
                </a>
            </p>
        </div>
    </div>

    <!-- Script Firebase -->
    <script type="module">
        // 1. Importar as bibliotecas necessárias da Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 2. Configuração da sua aplicação Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAVThw7fxVoEQHJMMiuwLfLSvlevKetlIg",
            authDomain: "sua-viagem-aqui-b0173.firebaseapp.com",
            projectId: "sua-viagem-aqui-b0173",
            storageBucket: "sua-viagem-aqui-b0173.appspot.com",
            messagingSenderId: "593994869307",
            appId: "1:593994869307:web:c66462ff2c524f55ad0a1e",
            measurementId: "G-YM78TFYN25"
        };

        // 3. Inicializar a Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 4. Lógica do Formulário de Cadastro
        const registerForm = document.getElementById('register-form');
        const feedbackContainer = document.getElementById('feedback-container');
        const submitButton = document.getElementById('submit-button');
        const buttonText = document.getElementById('button-text');
        const buttonSpinner = document.getElementById('button-spinner');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI feedback
            submitButton.disabled = true;
            buttonText.textContent = 'A processar...';
            buttonSpinner.classList.remove('hidden');
            feedbackContainer.innerHTML = '';

            // Obter valores do formulário
            const businessName = registerForm['business-name'].value;
            const ownerName = registerForm['owner-name'].value;
            const email = registerForm['email'].value;
            const whatsapp = registerForm['whatsapp'].value;
            const password = registerForm['password'].value;
            const confirmPassword = registerForm['confirm-password'].value;
            const category = registerForm['category'].value;

            // Validação da senha
            if (password !== confirmPassword) {
                showFeedback('As senhas não coincidem.', 'error');
                resetButton();
                return;
            }
            if (password.length < 6) {
                showFeedback('A senha deve ter no mínimo 6 caracteres.', 'error');
                resetButton();
                return;
            }

            try {
                // Passo 1: Criar o utilizador no Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Passo 2: Guardar as informações adicionais no Firestore
                // Usamos o UID do utilizador como ID do documento na coleção 'partners'
                const partnerDocRef = doc(db, 'partners', user.uid);
                
                await setDoc(partnerDocRef, {
                    ownerUid: user.uid,
                    businessName: businessName,
                    ownerName: ownerName,
                    email: email,
                    whatsapp: whatsapp,
                    category: category,
                    status: 'pendente', // Status inicial
                    createdAt: serverTimestamp(), // Data de criação
                    // O ID de parceiro de 6 dígitos será adicionado depois pelo admin ou por uma Cloud Function
                });

                // Sucesso!
                showFeedback('Cadastro realizado com sucesso! Em breve a nossa equipa irá analisar e aprovar o seu perfil.', 'success');
                registerForm.reset();

            } catch (error) {
                console.error('Erro no cadastro:', error.code, error.message);
                let friendlyMessage = 'Ocorreu um erro ao realizar o cadastro. Tente novamente.';
                if (error.code === 'auth/email-already-in-use') {
                    friendlyMessage = 'Este endereço de e-mail já está a ser utilizado.';
                } else if (error.code === 'auth/invalid-email') {
                    friendlyMessage = 'O formato do e-mail é inválido.';
                }
                showFeedback(friendlyMessage, 'error');
            } finally {
                resetButton();
            }
        });

        function showFeedback(message, type) {
            const messageClass = type === 'error' ? 'error-message' : 'success-message';
            feedbackContainer.innerHTML = `<div class="feedback-message ${messageClass}">${message}</div>`;
        }

        function resetButton() {
            submitButton.disabled = false;
            buttonText.textContent = 'Finalizar Cadastro';
            buttonSpinner.classList.add('hidden');
        }

    </script>
</body>
</html>
