<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sua Viagem Aqui</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0D1117; /* Tema escuro para consistência */
            color: #E6EDF3;
        }
        .form-input {
            background-color: #010409;
            border: 1px solid #30363D;
            color: #E6EDF3;
            border-radius: 8px;
            padding: 12px 16px;
            width: 100%;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #FF3300;
        }
        .btn-custom-orange {
            background-color: #FF3300;
            color: white;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn-custom-orange:hover {
            background-color: #ff5533;
        }
        .error-message {
            background-color: #481212;
            color: #f87171;
            border: 1px solid #f87171;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Container Principal -->
    <div class="flex flex-col items-center justify-center min-h-screen px-4">

        <!-- Logo -->
        <a href="index.html" class="flex items-center group mb-8">
            <i class="fas fa-map-marker-alt text-yellow-400 text-3xl mr-3"></i>
            <span class="text-2xl font-bold text-white">Sua Viagem <span class="text-orange-600">Aqui</span></span>
        </a>

        <!-- Cartão do Formulário -->
        <div class="w-full max-w-md p-8 space-y-6 bg-[#161B22] rounded-2xl shadow-lg border border-[#30363D]">

            <!-- Cabeçalho -->
            <div>
                <h2 class="text-2xl font-bold text-center text-white">
                    Aceder à sua Conta
                </h2>
                <p class="mt-2 text-sm text-center text-gray-400">
                    Bem-vindo de volta!
                </p>
            </div>

            <!-- Mensagem de Erro (escondida por padrão) -->
            <div id="error-message-container" class="hidden">
                 <!-- O conteúdo da mensagem será inserido via JS -->
            </div>

            <!-- Formulário de Login -->
            <form id="login-form" class="space-y-6">

                <!-- Campo E-mail -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-300">
                        E-mail
                    </label>
                    <div class="mt-1">
                        <input id="email" name="email" type="email" autocomplete="email" required
                               class="form-input placeholder-gray-500">
                    </div>
                </div>

                <!-- Campo Palavra-passe -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300">
                        Palavra-passe
                    </label>
                    <div class="mt-1">
                        <input id="password" name="password" type="password" autocomplete="current-password" required
                               class="form-input placeholder-gray-500">
                    </div>
                </div>

                <!-- Botão de Submissão -->
                <div>
                    <button type="submit" id="submit-button"
                            class="w-full flex justify-center btn-custom-orange">
                        Entrar
                    </button>
                </div>
            </form>

            <!-- Link para Registo -->
            <p class="text-sm text-center text-gray-400">
                Ainda não tem uma conta?
                <a href="cadastro_anunciantes.html" class="font-medium text-orange-500 hover:text-orange-400">
                    Registe-se aqui
                </a>
            </p>
        </div>
    </div>

    <!-- Script Firebase -->
    <script type="module">
        // 1. Importar as bibliotecas necessárias da Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // 2. Configuração da sua aplicação Firebase (a mesma do index.html)
        const firebaseConfig = {
            apiKey: "AIzaSyAVThw7fxVoEQHJMMiuwLfLSvlevKetlIg",
            authDomain: "sua-viagem-aqui-b0173.firebaseapp.com",
            projectId: "sua-viagem-aqui-b0173",
            storageBucket: "sua-viagem-aqui-b0173.appspot.com",
            messagingSenderId: "593994869307",
            appId: "1:593994869307:web:c66462ff2c524f55ad0a1e",
            measurementId: "G-YM78TFYN25"
        };

        // 3. Inicializar a Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 4. Lógica do Formulário de Login
        const loginForm = document.getElementById('login-form');
        const errorMessageContainer = document.getElementById('error-message-container');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Impede o recarregamento da página

            // Obter os valores dos campos
            const email = loginForm.email.value;
            const password = loginForm.password.value;

            // Limpar mensagens de erro antigas
            errorMessageContainer.innerHTML = '';
            errorMessageContainer.classList.add('hidden');

            try {
                // Tentar fazer login com a Firebase
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                console.log('Login bem-sucedido:', user);
                
                // Redirecionar para o painel de administração se for o admin
                if (user.email === "suaviagemaqui.adm@gmail.com") {
                    window.location.href = 'admin.html';
                } else {
                    // Redirecionar para o dashboard geral para outros utilizadores
                    window.location.href = 'dashboard.html';
                }

            } catch (error) {
                console.error('Erro no login:', error.code);
                let friendlyMessage = 'Ocorreu um erro. Por favor, tente novamente.';
                
                // Traduzir os erros da Firebase para mensagens amigáveis
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    friendlyMessage = 'E-mail ou palavra-passe incorretos.';
                } else if (error.code === 'auth/invalid-email') {
                    friendlyMessage = 'O formato do e-mail é inválido.';
                }
                
                // Exibir a mensagem de erro
                errorMessageContainer.innerHTML = `<div class="error-message">${friendlyMessage}</div>`;
                errorMessageContainer.classList.remove('hidden');
            }
        });
    </script>

</body>
</html>
